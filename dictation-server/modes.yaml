- id: grammar_clean
  label: Grammar Clean
  icon: broom
  whisper_model: large-v3-turbo
  pipeline:
  - whisper
  - vocab_correct
  - grammar_clean
  system_prompt: Rewrite the following raw dictated speech with correct punctuation,
    capitalization, and sentence structure. Preserve the speaker's exact meaning and
    word choices; only fix mechanics. Do not add content. Output only the cleaned
    text.
  temperature: 0.2
  preset: default
  use_persona: false
  use_character: false
  use_chat_context: false
  use_rules: false
