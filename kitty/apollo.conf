# ─────────────────────────────────────────────────────────
# Apollo flight-deck — kitty configuration
# Loaded by `oc` via `kitty --config`.
# Does not affect other kitty instances.
# ─────────────────────────────────────────────────────────

font_family           Monaspace Krypton
font_size             13.0
modify_font           cell_height 115%

window_padding_width  18 14
hide_window_decorations  yes

background_opacity    1.0
background_blur       0

cursor_shape          block
cursor                #FFB648
cursor_blink_interval 0
cursor_trail          0

selection_foreground  #0E0B08
selection_background  #FFB648

url_color             #6FC5C0
url_style             single

enable_audio_bell     no
visual_bell_duration  0.18
bell_on_tab           no

# Launchpad -> cockpit title handoff uses `kitty @ set-window-title` from inside
# the Apollo window, so this isolated config needs its own remote-control socket.
allow_remote_control  yes
listen_on             unix:/tmp/kitty-{kitty_pid}

# ── ANSI 16-color — Apollo mapping ────────────────────
color0   #0E0B08
color1   #FF5A4E
color2   #A8C97B
color3   #FFB648
color4   #6FC5C0
color5   #D28BD8
color6   #8FE2DD
color7   #F2E3C6
color8   #7A6A52
color9   #FF8274
color10  #C9E89B
color11  #FFD080
color12  #8FE2DD
color13  #EBA9F0
color14  #A2F1E0
color15  #FFFBEE

foreground            #F2E3C6
background            #0E0B08
