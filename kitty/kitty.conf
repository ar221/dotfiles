# Font
font_family      Monaspace Krypton
font_size 18.0
bold_font                    auto
italic_font                  auto
bold_italic_font             auto
remember_window_size         no
initial_window_width         950
initial_window_height        500
cursor_blink_interval        0.5
cursor_stop_blinking_after   1
cursor_trail                 1
cursor_trail_decay           0.1 0.4
cursor_trail_start_threshold 6
scrollback_lines             2000
wheel_scroll_min_lines       1
enable_audio_bell            no
window_padding_width         10
hide_window_decorations      yes
background_opacity           1.0
dynamic_background_opacity   yes
confirm_os_window_close      0
linux_display_server         wayland
allow_remote_control         yes
listen_on                    unix:/tmp/kitty-{kitty_pid}

# --- Mission-Clock surface treatment (whisper film grain) ---
# 512x512 grayscale noise, tiled. Grain should be invisible at reading distance,
# visible if you look for it. Raise background_tint_gaps or lower background_opacity
# slightly if the terminal fg looks thin over the grain.
background_image           ~/.config/kitty/assets/grain.png
background_image_layout    tiled
background_image_linear    yes
background_tint            0.97

# Cursor
cursor_shape beam
cursor_trail 1

# Padding (why weird value? consistency with foot)
window_margin_width 21.75

# No stupid close confirmation
confirm_os_window_close 0

# Use fish shell
shell fish
shell_integration            enabled

#----------Keybinds---------#
#---------------------------#
# Specifying mod key
kitty_mod alt

# Copy
map ctrl+c    copy_or_interrupt

# Search
map ctrl+f   launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id
map kitty_mod+f   launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id

# Scroll & Zoom
map page_up    scroll_page_up
map page_down    scroll_page_down

map ctrl+plus  change_font_size all +1
map ctrl+equal  change_font_size all +1
map ctrl+kp_add  change_font_size all +1
map ctrl+minus       change_font_size all -1
map ctrl+underscore       change_font_size all -1
map ctrl+kp_subtract       change_font_size all -1
map ctrl+0 change_font_size all 0
map ctrl+kp_0 change_font_size all 0

# Tabs
map alt+t       new_tab
map alt+]       next_tab
map alt+[       previous_tab
map alt+w       close_tab

# Splits (layouts)
map alt+\       launch --location=vsplit
map alt+-       launch --location=hsplit
map alt+shift+] next_window
map alt+shift+[ previous_window

# Layout cycling
map alt+l       next_layout


# Tab bar — custom draw hosts the opencode statusline (tab_bar.py)
tab_bar_style                custom
tab_bar_edge                 top
tab_bar_min_tabs             1
tab_bar_align                left
tab_separator                ""
tab_powerline_style          angled
tab_title_template           "{title}"

include current-theme.conf
