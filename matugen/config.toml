# Matugen configuration for ii-niri
# Generates Material You colors from wallpaper

[config]
version_check = false

# Colors for Quickshell ii
[templates.m3colors]
input_path = '~/.config/matugen/templates/colors.json'
output_path = '~/.local/state/quickshell/user/generated/colors.json'

# Fuzzel launcher theme
[templates.fuzzel]
input_path = '~/.config/matugen/templates/fuzzel/fuzzel_theme.ini'
output_path = '~/.config/fuzzel/fuzzel_theme.ini'

# GTK3 theme
[templates.gtk3]
input_path = '~/.config/matugen/templates/gtk-3.0/gtk.css'
output_path = '~/.config/gtk-3.0/gtk.css'

# GTK4 theme
[templates.gtk4]
input_path = '~/.config/matugen/templates/gtk-4.0/gtk.css'
output_path = '~/.config/gtk-4.0/gtk.css'

# KDE colors (for Dolphin integration)
[templates.kde_colors]
input_path = '~/.config/matugen/templates/kde/color.txt'
output_path = '~/.local/state/quickshell/user/generated/color.txt'

[templates.folders-color]
input_path  = './templates/folder-color.txt'
output_path = '~/.config/matugen/papirus-folders/folder-color.txt'
post_hook = 'bash ~/.config/matugen/papirus-folders/change-icons.sh'

[templates.qt5ct]
input_path = '~/.config/matugen/templates/qtct-colors-new.conf'
output_path = '~/.config/qt5ct/colors/matugen.conf'

[templates.kvantum]
input_path = '~/.config/matugen/templates/matugen.kvconfig'
output_path = '~/.config/Kvantum/matugen/matugen.kvconfig'

[templates.qt6ct]
input_path = '~/.config/matugen/templates/qtct-colors-new.conf'
output_path = '~/.config/qt6ct/colors/matugen.conf'

# Wallpaper path tracking
[templates.wallpaper]
input_path = '~/.config/matugen/templates/wallpaper.txt'
output_path = '~/.local/state/quickshell/user/generated/wallpaper/path.txt'

[templates.vesktop]
input_path  = "./templates/discord.css"
output_path = "~/.config/vesktop/themes/Matugen.css"

[templates.rmpc]
input_path = '~/.config/matugen/templates/rmpc.ron'
output_path = '~/.config/rmpc/themes/custom.ron'

[templates.yazi]
input_path  = './templates/terminal/yazi.toml'
output_path = '~/.config/yazi/theme.toml'

[templates.fish]
input_path  = './templates/terminal/colors.fish'
output_path = '~/.config/fish/themes/Matugen.theme'

# fzf — generated by scripts/colors/generate_terminal_configs.py for fish
# Bash/zsh template disabled — this system uses fish
# [templates.fzf]
# input_path  = './templates/terminal/fzf.sh'
# output_path = '~/.cache/zsh/fzf'

[templates.bat]
input_path  = './templates/terminal/bat.theme'
output_path = '~/.config/bat/themes/Matugen.theme'

[templates.neovim-nvchad]
input_path  = './templates/terminal/nvchad.lua'
output_path = '~/.local/share/nvim/lazy/base46/lua/base46/themes/matugen.lua'

# Zathura — generated by scripts/colors/generate_terminal_configs.py, not matugen
# [templates.zathura]

[templates.cava]
input_path  = "./templates/terminal/cava.config"
output_path = "~/.config/cava/config"

# mpv OSC (on-screen controller) colors
[templates.mpv-osc]
input_path = '~/.config/matugen/templates/mpv-osc.conf'
output_path = '~/.config/mpv/script-opts/osc.conf'

[templates.btop]
input_path  = './templates/terminal/btop.theme'
output_path = '~/.config/btop/themes/matugen.theme'

# SillyTavern NSD-DarkLuxury color overrides
[templates.sillytavern]
input_path = './templates/sillytavern.css'
output_path = '/mnt/hdd/AI/SillyTavern/data/default-user/extensions/NSD-DarkLuxury/matugen-colors.css'

[templates.firefox]
input_path = '~/.config/matugen/templates/firefox/shy-material-colors.css'
output_path = '~/.config/mozilla/firefox/3kmy38qw.default-release/chrome/ShyFox/shy-material-colors.css'

# pywalfox removed — shy-material-colors.css handles Firefox theming directly
# [templates.pywalfox]
# input_path = '~/.config/matugen/templates/pywalfox-colors.json'
# output_path = '~/.cache/wal/colors.json'
# post_hook = "pywalfox update"

# Adwaita-for-Steam Material You colortheme
[templates.adwaita-steam]
input_path = '~/.config/matugen/templates/adwaita-steam.css'
output_path = '~/.local/share/Steam/steamui/adwaita/colorthemes/matugen/matugen.css'
post_hook = 'bash ~/.local/bin/adwaita-steam-apply'

[templates.iisddmtheme]
input_path = '~/.config/ii-sddm-theme/SddmColors.qml'
output_path = '~/.config/ii-sddm-theme/Colors.qml'
post_hook = 'python3 ~/.config/ii-sddm-theme/generate_settings.py && sudo ~/.config/ii-sddm-theme/sddm-theme-apply.sh &'
