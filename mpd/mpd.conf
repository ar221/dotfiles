music_directory		"/home/ayaz/Music/"
pid_file "/home/ayaz/.config/mpd/pid"
db_file "/home/ayaz/.config/mpd/db"
state_file "/home/ayaz/.config/mpd/state"
playlist_directory	"~/.config/mpd/playlist"
log_file "/home/ayaz/.config/mpd/mpd.log"

auto_update "yes"
bind_to_address "127.0.0.1"
port            "6600"
restore_paused "yes"
max_output_buffer_size "16384"

audio_output {
        type            "pipewire"
        name            "PipeWire Sound Server"
}

audio_output {
       type	"fifo"
       name	"Visualizer feed"
       path	"/tmp/mpd.fifo"
       format	"44100:16:2"
}
