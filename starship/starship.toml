palette = "ii"

# Don't print a new line at the start of the prompt
add_newline = false
# Pipes ╰─ ╭─
# Powerline symbols                                     
# Wedges 🭧🭒 🭣🭧🭓
# Random noise 🬖🬥🬔🬗
# Cool stuff 󰜥   

# format = """
# $cmd_duration$username$hostname $directory $git_branch
# $character
# """
format = """
[](fg:tertiary)$cmd_duration[](fg:tertiary bg:primary)$directory[](fg:primary) $git_branch
$character"""

# Replace the "❯" symbol in the prompt with "➜"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[   ](bold fg:primary)"
error_symbol = "[   ](bold fg:red)"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[git_branch]
style = "bg:secondary"
symbol = "󰘬"
truncation_length = 12
truncation_symbol = ""
format = "[](fg:secondary)[ $symbol $branch(:$remote_branch) ](fg:onSecondary bg:secondary)[](fg:secondary)"

[git_commit]
commit_hash_length = 4
tag_symbol = " "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[ PICKING](bold red)"

[git_status]
conflicted = " = "
ahead = " ⇡ "
behind = " ⇣ "
diverged = " ⇕ "
untracked = " ? "
stashed = " ≡ "
modified = " ! "
staged = '[++\($count\)](green)'
renamed = " » "
deleted = " ✘ "

[hostname]
ssh_only = false
format =  "[•$hostname](bg:secondary bold fg:onSecondary)[](bold fg:secondary)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed green"

[time]
disabled = true
format = '🕙[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:secondary fg:onSecondary"
style_root = "red bold"
format = "[](bold fg:secondary)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = "  "
read_only = "  "
style = "bg:primary fg:onPrimary"
truncation_length = 6
truncation_symbol = " ••/"
format = '[ 󰉋 $path ]($style)'


[directory.substitutions]
"Desktop" = "  "
"Documents" = "  "
"Downloads" = "  "
"Music" = " 󰎈 "
"Pictures" = "  "
"Videos" = "  "
"GitHub" = " 󰊤 "

[cmd_duration]
min_time = 0
format = '[ 󰪢 $duration ](bold bg:tertiary fg:onTertiary)'

