# ─────────────────────────────────────────────────────────
# Apollo flight-deck — tmux configuration (Constellation update)
# Loaded by oc via `tmux -L apollo-<slug> -f`. Isolated sockets.
# ─────────────────────────────────────────────────────────

set  -g mouse on
set  -g history-limit 50000
set  -g status-interval 2
setw -g monitor-activity off
set  -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ── top status strip ──────────────────────────────────
set  -g status on
set  -g status-position top
set  -g status-style "fg=#C9B28B,bg=#1C150C"
set  -g status-left-length 80
set  -g status-right-length 100

set  -g status-left "#[fg=#FFB648,bold]●#[fg=#C9B28B,nobold] #(basename #{pane_current_path}) #[fg=#7A6A52]·#[fg=#F2E3C6] #(cd #{pane_current_path} 2>/dev/null && git symbolic-ref --short HEAD 2>/dev/null || echo '—') "

# status-right: build · ×N (if N>1) · model · zen · clock
# window_panes counts panes in the current window; > 1 triggers ×N badge.
set  -g status-right "#[fg=#3A2710,bg=#FFB648,bold] BUILD #[fg=#C9B28B,bg=#1C150C,nobold] #{?#{>:#{window_panes},1},#[fg=#FFD080]×#{window_panes} #[fg=#7A6A52]· ,}#[fg=#FFB648]SONNET 4.6#[fg=#7A6A52] · ZEN · #[fg=#FFD080]%H:%M "

# window list — hidden; we only run one tmux window
set -g status-justify left
setw -g window-status-format ""
setw -g window-status-current-format ""

# ── bottom strip via pane-border-status ───────────────
set  -g pane-border-status bottom
set  -g pane-border-format "#[fg=#7A6A52]  ^c exit · tab agent · / cmd · ^b f sidebar · ^b o co-pilot+rail · ^b R rail · ^b C cockpit    #[fg=#FFB648,bold]APOLLO#[fg=#7A6A52,nobold] · T+#{t/r:session_created}  "
set  -g pane-border-style "fg=#5A4420,bg=#050302"
set  -g pane-active-border-style "fg=#FFB648,bg=#050302"

# ─────────────────────────────────────────────────────────
# Constellation keybinds — deck toggles and nav
# Prefix is the default C-b.
# ─────────────────────────────────────────────────────────

# f — toggle sidebar deck (yazi, left, 28%)
bind f if-shell '[ "#{@sidebar_open}" = "1" ]' \
    'kill-pane -t sidebar; set -g @sidebar_open 0' \
    'split-window -hb -l 28% -c "#{pane_current_path}" "YAZI_CONFIG_HOME=$HOME/.config/yazi-apollo yazi \"#{pane_current_path}\""; select-pane -T sidebar; set -g @sidebar_open 1; select-pane -t !'

# o — toggle co-pilot deck (2nd opencode, right, 30% of remaining)
bind o run-shell "~/.local/bin/apollo-toggle-copilot"

# R — toggle Apollo telemetry rail on far-right
bind R run-shell "~/.local/bin/apollo-toggle-rail"

# C — reset cockpit layout (main + vault + log)
bind C run-shell "~/.local/bin/oc-cockpit-reset-layout"

# vim-style pane nav
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize focused pane by 5 cells
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# reload conf (Constellation addition)
bind r source-file ~/.config/tmux/apollo.conf \; display "apollo.conf reloaded"

# Track initial state of deck flags
set -g @sidebar_open 0
set -g @copilot_open 0
set -g @rail_open 0
