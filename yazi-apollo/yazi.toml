# ~/.config/yazi-apollo/yazi.toml
# Constellation sidebar — minimal yazi settings.
# Isolated from the user's regular yazi config via YAZI_CONFIG_HOME.

[manager]
ratio          = [1, 3, 2]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "size"
show_hidden    = false
show_symlink   = true

[preview]
tab_size      = 2
max_width     = 600
max_height    = 900
cache_dir     = ""
image_filter  = "triangle"
image_quality = 75
sixel_fraction = 15
