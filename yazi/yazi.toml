# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.
"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[mgr]
ratio          = [ 1, 4, 3 ]
sort_by        = "alphabetical"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
sort_translit  = false
linemode       = "none"
show_hidden    = false
show_symlink   = true
scrolloff      = 5
mouse_events   = [ "click", "scroll" ]
title_format   = "Yazi: {cwd}"

[preview]
wrap            = "no"
tab_size        = 4
max_width       = 1000
max_height      = 1200
cache_dir       = ""
image_delay     = 30
image_filter    = "triangle"
image_quality   = 90
sixel_fraction  = 15
ueberzug_scale  = 1
ueberzug_offset = [ 0, 0, 0, 0 ]

[opener]
edit = [
	{ run = '${EDITOR:-vi} %s', desc = "$EDITOR", block = true, for = "unix" },
	{ run = 'code %s', orphan = true, desc = "code", for = "windows" },
	{ run = 'code -w %s', block = true, desc = "code (block)", for = "windows" },
]
open = [
	{ run = 'xdg-open %s1', desc = "Open", for = "linux" },
	{ run = 'open %s', desc = "Open", for = "macos" },
	{ run = 'start "" %s1', orphan = true, desc = "Open", for = "windows" },
	{ run = 'termux-open %s1', desc = "Open", for = "android" },
]
reveal = [
	{ run = 'xdg-open %d1', desc = "Reveal", for = "linux" },
	{ run = 'open -R %s1', desc = "Reveal", for = "macos" },
	{ run = 'explorer /select,%s1', orphan = true, desc = "Reveal", for = "windows" },
	{ run = 'termux-open %d1', desc = "Reveal", for = "android" },
	{ run = 'clear; exiftool %s1; echo "Press enter to exit"; read _', block = true, desc = "Show EXIF", for = "unix" },
]
extract = [
	{ run = 'ya pub extract --list %s', desc = "Extract here" },
]
play = [
	{ run = 'xdg-open %s1', desc = "Play", for = "linux", orphan = true },
	{ run = 'mediainfo %s1; echo "Press enter to exit"; read _', block = true, desc = "Show media info", for = "unix" },
]
# Custom openers
edit_advanced = [
	{ run = 'nvim %s', desc = "Neovim", block = true, for = "unix" },
]
view_image = [
	{ run = 'imv %s', orphan = true, desc = "Imv", for = "linux" },
]
archive_manager = [
	{ run = 'file-roller %s', orphan = true, desc = "File Roller", for = "linux" },
]
view_pdf = [
	{ run = 'zathura %s1', orphan = true, desc = "Zathura", for = "linux" },
]

[open]
rules = [
	# Folder
	{ url = "*/", use = [ "edit", "open", "reveal" ] },

	# ESP/ESM/BSA files for Skyrim/FNV modding
	{ url = "*.{esp,esm,bsa,ba2}", use = [ "reveal" ] },

	# Script files
	{ url = "*.{sh,bash,zsh,fish}", use = [ "edit", "reveal" ] },

	# Config files
	{ url = "*.{conf,ini,cfg,toml,yaml,yml}", use = [ "edit", "reveal" ] },

	# Text
	{ mime = "text/*", use = [ "edit", "reveal" ] },
	# Image
	{ mime = "image/*", use = [ "view_image", "open", "reveal" ] },
	# Media
	{ mime = "{audio,video}/*", use = [ "play", "reveal" ] },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract", "archive_manager", "reveal" ] },
	# JSON
	{ mime = "application/{json,ndjson}", use = [ "edit", "reveal" ] },
	{ mime = "*/javascript", use = [ "edit", "reveal" ] },
	# PDF
	{ mime = "application/pdf", use = [ "view_pdf", "open", "reveal" ] },
	# Empty file
	{ mime = "inode/empty", use = [ "edit", "reveal" ] },

	# Fallback — must be LAST
	{ url = "*", use = [ "open", "reveal" ] },
]

[tasks]
micro_workers    = 20
macro_workers    = 20
bizarre_retry    = 3
image_alloc      = 1073741824  # 1gb
image_bound      = [ 0, 0 ]
suppress_preload = false

# [plugin] section — using yazi's built-in defaults for fetchers/spotters/preloaders/previewers
# Only custom additions below via prepend_fetchers (git plugin)

[input]
cursor_blink = false

# cd
cd_title  = "Change directory:"
cd_origin = "top-center"
cd_offset = [ 0, 2, 50, 3 ]

# create
create_title  = [ "Create:", "Create (dir):" ]
create_origin = "top-center"
create_offset = [ 0, 2, 50, 3 ]

# rename
rename_title  = "Rename:"
rename_origin = "hovered"
rename_offset = [ 0, 1, 50, 3 ]

# filter
filter_title  = "Filter:"
filter_origin = "top-center"
filter_offset = [ 0, 2, 50, 3 ]

# find
find_title  = [ "Find next:", "Find previous:" ]
find_origin = "top-center"
find_offset = [ 0, 2, 50, 3 ]

# search
search_title  = "Search via {n}:"
search_origin = "top-center"
search_offset = [ 0, 2, 50, 3 ]

# shell
shell_title  = [ "Shell:", "Shell (block):" ]
shell_origin = "top-center"
shell_offset = [ 0, 2, 50, 3 ]

[confirm]
# trash
trash_title  = "Trash {n} selected file{s}?"
trash_origin = "center"
trash_offset = [ 0, 0, 70, 20 ]

# delete
delete_title  = "Permanently delete {n} selected file{s}?"
delete_origin = "center"
delete_offset = [ 0, 0, 70, 20 ]

# overwrite
overwrite_title   = "Overwrite file?"
overwrite_content = "Will overwrite the following file:"
overwrite_origin  = "center"
overwrite_offset  = [ 0, 0, 50, 15 ]

# quit
quit_title   = "Quit?"
quit_content = "The following tasks are still running, are you sure you want to quit?"
quit_origin  = "center"
quit_offset  = [ 0, 0, 50, 15 ]

[pick]
open_title  = "Open with:"
open_origin = "hovered"
open_offset = [ 0, 1, 50, 7 ]

[which]
sort_by        = "none"
sort_sensitive = false
sort_reverse   = false
sort_translit  = false

# FIX: Git fetchers belong here (removed duplicates from theme.toml)
[[plugin.prepend_fetchers]]
id   = "git"
name = "*"
run  = "git"

[[plugin.prepend_fetchers]]
id   = "git"
name = "*/"
run  = "git"
